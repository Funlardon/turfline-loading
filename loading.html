<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariser Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
  .scene{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:32px 16px;width:100%;}
  .txt-svg{overflow:visible;display:block;}
  .ariser-svg{animation:revealUp .9s cubic-bezier(.22,1,.36,1) both;}
  .gaming-svg{animation:revealUp .9s .15s cubic-bezier(.22,1,.36,1) both;margin-top:-14px;}
  @keyframes revealUp{from{opacity:0;transform:translateY(22px) scale(.82);}to{opacity:1;transform:translateY(0) scale(1);}}
  .ariser-g{animation:flicker 6s 1.5s ease-in-out infinite;}
  @keyframes flicker{0%,91%,100%{opacity:1;}92%{opacity:.75;}93%{opacity:1;}}
  .scp-wrap{margin-top:20px;position:relative;width:136px;height:136px;animation:scpIn .7s 1s cubic-bezier(.22,1,.36,1) both;}
  @keyframes scpIn{from{opacity:0;transform:scale(.3);}to{opacity:1;transform:scale(1);}}
  .scp-static{position:absolute;inset:0;width:136px;height:136px;}
  .scp-spin{position:absolute;inset:0;width:136px;height:136px;animation:spin 4s linear infinite;transform-origin:68px 68px;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="scene">

<svg class="txt-svg ariser-svg" viewBox="0 0 700 175" width="min(700px,94vw)">
  <defs>
    <linearGradient id="gFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ffd0"/><stop offset="12%" stop-color="#80ff30"/>
      <stop offset="32%" stop-color="#39ff14"/><stop offset="60%" stop-color="#18aa00"/>
      <stop offset="82%" stop-color="#0a5c00"/><stop offset="100%" stop-color="#032200"/>
    </linearGradient>
    <linearGradient id="gSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".32"/><stop offset="28%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowA"><feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g class="ariser-g" filter="url(#glowA)">
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="none" stroke="#010a00" stroke-width="22" stroke-linejoin="round" transform="translate(10,10)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#010a00" transform="translate(10,10)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#021200" transform="translate(9,9)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#031800" transform="translate(8,8)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#042000" transform="translate(7,7)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#062a00" transform="translate(6,6)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#083500" transform="translate(5,5)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#0a4200" transform="translate(4,4)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#0d5200" transform="translate(3,3)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#106200" transform="translate(2,2)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="#147500" transform="translate(1,1)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="none" stroke="#011800" stroke-width="20" stroke-linejoin="round">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="none" stroke="#0a4a00" stroke-width="8" stroke-linejoin="round">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="url(#gFace)">ARISER</text>
    <text x="350" y="148" font-family="'Russo One',sans-serif" font-size="148" font-style="italic" text-anchor="middle" fill="url(#gSheen)">ARISER</text>
  </g>
</svg>

<svg class="txt-svg gaming-svg" viewBox="0 0 700 130" width="min(700px,94vw)">
  <defs>
    <linearGradient id="gSilver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="18%" stop-color="#e8e8e8"/>
      <stop offset="48%" stop-color="#aaaaaa"/><stop offset="76%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#242424"/>
    </linearGradient>
    <linearGradient id="gSilverSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".24"/><stop offset="32%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowG"><feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glowG)">
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="none" stroke="#080808" stroke-width="22" stroke-linejoin="round" transform="translate(9,9)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#080808" transform="translate(9,9)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#0e0e0e" transform="translate(8,8)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#151515" transform="translate(7,7)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#1d1d1d" transform="translate(6,6)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#262626" transform="translate(5,5)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#303030" transform="translate(4,4)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#3c3c3c" transform="translate(3,3)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#484848" transform="translate(2,2)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="#565656" transform="translate(1,1)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="none" stroke="#111" stroke-width="18" stroke-linejoin="round">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="none" stroke="#333" stroke-width="7" stroke-linejoin="round">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="url(#gSilver)">GAMING</text>
    <text x="350" y="112" font-family="'Russo One',sans-serif" font-size="116" font-style="italic" text-anchor="middle" letter-spacing="6" fill="url(#gSilverSheen)">GAMING</text>
  </g>
</svg>

<div class="scp-wrap">
  <!-- SPINNING: arrows only -->
  <svg class="scp-spin" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="arrowFace" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#b0ff80"/><stop offset="35%" stop-color="#39ff14"/>
        <stop offset="70%" stop-color="#1acc00"/><stop offset="100%" stop-color="#0a6600"/>
      </radialGradient>
    </defs>
    <g transform="translate(8,8)"><g fill="#010a00"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/><g transform="rotate(120 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g><g transform="rotate(240 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g></g></g>
    <g transform="translate(6,6)"><g fill="#031f00"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/><g transform="rotate(120 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g><g transform="rotate(240 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g></g></g>
    <g transform="translate(4,4)"><g fill="#063600"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/><g transform="rotate(120 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g><g transform="rotate(240 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g></g></g>
    <g transform="translate(2,2)"><g fill="#0b5800"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/><g transform="rotate(120 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g><g transform="rotate(240 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g></g></g>
    <g fill="url(#arrowFace)">
      <path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/>
      <g transform="rotate(120 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g>
      <g transform="rotate(240 100 100)"><path d="M100,86 L100,28 L88,44 L100,40 L112,44 Z"/><polygon points="100,20 82,50 118,50"/></g>
    </g>
  </svg>
  <!-- STATIC: centre hub only -->
  <svg class="scp-static" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="hubFace" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#b0ff80"/><stop offset="35%" stop-color="#39ff14"/>
        <stop offset="70%" stop-color="#1acc00"/><stop offset="100%" stop-color="#0a6600"/>
      </radialGradient>
    </defs>
    <circle cx="100" cy="100" r="14" fill="#010a00" transform="translate(8,8)"/>
    <circle cx="100" cy="100" r="14" fill="#031f00" transform="translate(6,6)"/>
    <circle cx="100" cy="100" r="14" fill="#063600" transform="translate(4,4)"/>
    <circle cx="100" cy="100" r="14" fill="#0b5800" transform="translate(2,2)"/>
    <circle cx="100" cy="100" r="14" fill="url(#hubFace)"/>
    <circle cx="100" cy="100" r="8"  fill="#000"/>
  </svg>
</div>

</div>
</body>
</html>
