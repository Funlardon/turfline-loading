<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turfline RP - Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Advanced layered background */
        .background-base {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(10, 20, 40, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 60%, rgba(40, 10, 20, 0.3) 0%, transparent 50%),
                linear-gradient(180deg, #000000 0%, #0a0a15 30%, #050510 70%, #000000 100%);
            z-index: 0;
        }

        /* Animated stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }

        /* Moving clouds/fog layers */
        .fog-layer {
            position: fixed;
            width: 200%;
            height: 100%;
            top: 0;
            left: -50%;
            z-index: 2;
        }

        .fog-layer-1 {
            background: 
                radial-gradient(ellipse at 20% 40%, rgba(30, 40, 60, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(40, 30, 50, 0.12) 0%, transparent 40%);
            animation: fogDrift1 60s ease-in-out infinite;
        }

        .fog-layer-2 {
            background: 
                radial-gradient(ellipse at 50% 30%, rgba(50, 50, 70, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(60, 40, 50, 0.08) 0%, transparent 45%);
            animation: fogDrift2 45s ease-in-out infinite reverse;
        }

        @keyframes fogDrift1 {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(5%) translateY(-2%); }
        }

        @keyframes fogDrift2 {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-3%) translateY(2%); }
        }

        /* Realistic cityscape with parallax */
        .city-background {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            z-index: 3;
        }

        .city-far {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 25%;
            opacity: 0.3;
            filter: blur(2px);
        }

        .city-mid {
            position: absolute;
            bottom: 8%;
            width: 100%;
            height: 35%;
            opacity: 0.5;
            filter: blur(1px);
        }

        .city-near {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
            opacity: 0.8;
        }

        .building {
            position: absolute;
            bottom: 0;
            background: linear-gradient(to right, 
                rgba(8, 8, 12, 1) 0%, 
                rgba(15, 15, 20, 1) 30%,
                rgba(12, 12, 16, 1) 70%,
                rgba(8, 8, 12, 1) 100%);
            box-shadow: 
                inset -3px 0 15px rgba(0, 0, 0, 0.9),
                inset 3px 0 10px rgba(255, 255, 255, 0.01);
        }

        .building::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, 
                    transparent 0px, 
                    transparent 14px, 
                    rgba(25, 25, 30, 0.5) 14px, 
                    rgba(25, 25, 30, 0.5) 16px),
                repeating-linear-gradient(90deg, 
                    transparent 0px, 
                    transparent 9px, 
                    rgba(20, 20, 25, 0.4) 9px, 
                    rgba(20, 20, 25, 0.4) 11px);
        }

        .building-antenna {
            position: absolute;
            top: -30px;
            left: 50%;
            width: 2px;
            height: 30px;
            background: linear-gradient(to top, rgba(200, 0, 0, 0.8), transparent);
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
        }

        .building-antenna::after {
            content: '';
            position: absolute;
            top: 0;
            left: -2px;
            width: 6px;
            height: 6px;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            animation: beaconBlink 2s ease-in-out infinite;
        }

        @keyframes beaconBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .window {
            position: absolute;
            background: rgba(255, 220, 180, 0.4);
            box-shadow: 0 0 4px rgba(255, 200, 150, 0.3);
            animation: windowFlicker 5s ease-in-out infinite;
        }

        @keyframes windowFlicker {
            0%, 100% { opacity: 0.3; }
            25% { opacity: 0.7; }
            50% { opacity: 0.4; }
            75% { opacity: 0.8; }
        }

        /* Street level details */
        .street-level {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 1) 0%,
                rgba(10, 5, 5, 0.9) 30%,
                transparent 100%);
            z-index: 4;
        }

        .street-lights {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        .street-light {
            position: absolute;
            bottom: 20%;
        }

        .street-light::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to top, rgba(80, 80, 90, 0.8), rgba(60, 60, 70, 0.4));
            bottom: 0;
        }

        .street-light::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -4px;
            width: 10px;
            height: 10px;
            background: rgba(255, 200, 100, 0.8);
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(255, 200, 100, 0.6),
                0 0 40px rgba(255, 200, 100, 0.3);
            animation: lightFlicker 4s ease-in-out infinite;
        }

        @keyframes lightFlicker {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.95; }
        }

        .light-glow {
            position: absolute;
            bottom: 0;
            width: 150px;
            height: 100px;
            background: radial-gradient(ellipse at top, 
                rgba(255, 200, 100, 0.1) 0%,
                transparent 60%);
            left: -75px;
        }

        /* Enhanced police lights */
        .police-lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            mix-blend-mode: screen;
        }

        .siren-left, .siren-right {
            position: absolute;
            width: 60%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        .siren-left {
            left: 0;
            background: 
                radial-gradient(ellipse at 15% 25%, rgba(0, 80, 255, 0.25) 0%, transparent 40%),
                radial-gradient(ellipse at 5% 50%, rgba(0, 60, 200, 0.15) 0%, transparent 50%);
            animation: sirenFlashBlue 2s ease-in-out infinite;
        }

        .siren-right {
            right: 0;
            background: 
                radial-gradient(ellipse at 85% 25%, rgba(255, 0, 50, 0.25) 0%, transparent 40%),
                radial-gradient(ellipse at 95% 50%, rgba(200, 0, 40, 0.15) 0%, transparent 50%);
            animation: sirenFlashRed 2s ease-in-out infinite;
        }

        @keyframes sirenFlashBlue {
            0%, 45%, 55%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @keyframes sirenFlashRed {
            0%, 95%, 100% { opacity: 0; }
            5%, 45%, 55%, 95% { opacity: 1; }
        }

        /* Volumetric light beams */
        .light-beams {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.4;
            mix-blend-mode: screen;
        }

        .beam {
            position: absolute;
            width: 2px;
            height: 40%;
            background: linear-gradient(to bottom, 
                rgba(100, 150, 255, 0.1) 0%,
                transparent 100%);
            transform-origin: top center;
            animation: beamSweep 10s ease-in-out infinite;
        }

        @keyframes beamSweep {
            0%, 100% { transform: rotate(-5deg); opacity: 0.3; }
            50% { transform: rotate(5deg); opacity: 0.6; }
        }

        /* Content container */
        .main-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            width: 90%;
            max-width: 800px;
        }

        /* Server logo with glow effects */
        .logo-section {
            text-align: center;
            margin-bottom: 4rem;
            opacity: 0;
            animation: logoAppear 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes logoAppear {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .server-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 0.25em;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, 
                #ffffff 0%, 
                #e8e8e8 25%,
                #ffffff 50%,
                #d0d0d0 75%,
                #ffffff 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            animation: 
                logoGradient 5s ease infinite,
                logoFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0, 100, 255, 0.4));
        }

        @keyframes logoGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .server-tagline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.5em;
            color: rgba(200, 200, 200, 0.7);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            animation: fadeIn 1s ease forwards 0.5s;
            opacity: 0;
        }

        .server-description {
            font-size: 0.9rem;
            color: rgba(150, 150, 150, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeIn 1s ease forwards 0.8s;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Advanced loading section */
        .loading-wrapper {
            margin-top: 3rem;
            opacity: 0;
            animation: slideUp 1s ease forwards 1s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Progress bar with multiple layers */
        .progress-outer {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(30, 30, 40, 0.6);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 
                inset 0 2px 6px rgba(0, 0, 0, 0.8),
                0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(50, 50, 60, 0.5);
        }

        .progress-inner {
            position: relative;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, 
                rgba(180, 0, 0, 0.9) 0%,
                rgba(255, 30, 30, 1) 30%,
                rgba(255, 50, 50, 1) 50%,
                rgba(255, 30, 30, 1) 70%,
                rgba(180, 0, 0, 0.9) 100%);
            background-size: 200% 100%;
            box-shadow: 
                0 0 25px rgba(255, 0, 0, 0.6),
                0 0 15px rgba(255, 0, 0, 0.4),
                inset 0 1px 2px rgba(255, 255, 255, 0.3);
            animation: 
                progressFill 6s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                progressPulse 2s ease-in-out infinite;
            border-radius: 3px;
        }

        @keyframes progressFill {
            to { width: 100%; }
        }

        @keyframes progressPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 20px rgba(255, 0, 0, 0.5),
                    0 0 10px rgba(255, 0, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 35px rgba(255, 0, 0, 0.8),
                    0 0 20px rgba(255, 0, 0, 0.5);
            }
        }

        .progress-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.4) 50%, 
                transparent 100%);
            animation: progressShimmer 2s ease-in-out infinite;
        }

        @keyframes progressShimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        /* Realistic blood drips */
        .blood-drips {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 30px;
        }

        .blood-drop {
            position: absolute;
            width: 4px;
            height: 0;
            background: linear-gradient(to bottom, 
                rgba(120, 0, 0, 0.95) 0%,
                rgba(90, 0, 0, 0.8) 40%,
                rgba(70, 0, 0, 0.6) 70%,
                rgba(50, 0, 0, 0.3) 100%);
            border-radius: 0 0 50% 50%;
            opacity: 0;
            animation: bloodFall 4s ease-out infinite;
            filter: blur(0.3px);
        }

        .blood-drop::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(100, 0, 0, 0.6), transparent);
            border-radius: 50%;
        }

        .blood-drop:nth-child(1) { left: 18%; animation-delay: 0.6s; }
        .blood-drop:nth-child(2) { left: 35%; animation-delay: 1.4s; width: 3px; }
        .blood-drop:nth-child(3) { left: 52%; animation-delay: 2.2s; }
        .blood-drop:nth-child(4) { left: 68%; animation-delay: 0.9s; width: 5px; }
        .blood-drop:nth-child(5) { left: 82%; animation-delay: 1.8s; }
        .blood-drop:nth-child(6) { left: 92%; animation-delay: 2.7s; width: 3px; }

        @keyframes bloodFall {
            0% {
                height: 0;
                opacity: 0;
            }
            15% {
                height: 15px;
                opacity: 0.9;
            }
            35% {
                height: 22px;
                opacity: 0.7;
            }
            60% {
                height: 28px;
                opacity: 0.4;
            }
            100% {
                height: 32px;
                opacity: 0;
                transform: translateY(8px);
            }
        }

        /* Loading information display */
        .loading-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.8rem;
            padding: 0 0.5rem;
        }

        .status-left {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .status-main {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(220, 220, 220, 0.9);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { 
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }
            50% { 
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            }
        }

        .status-sub {
            font-size: 0.75rem;
            color: rgba(150, 150, 150, 0.6);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .status-right {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .percentage-large {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            line-height: 1;
        }

        .percentage-label {
            font-size: 0.9rem;
            color: rgba(150, 150, 150, 0.5);
            font-weight: 300;
        }

        /* System information panels */
        .info-panels {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1.8s;
            z-index: 20;
        }

        .info-panel {
            text-align: center;
            padding: 1rem 1.5rem;
            background: rgba(15, 15, 20, 0.4);
            border: 1px solid rgba(80, 80, 100, 0.2);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .panel-label {
            font-size: 0.7rem;
            color: rgba(150, 150, 150, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.4rem;
        }

        .panel-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.05em;
        }

        .panel-value.online {
            color: rgba(100, 255, 100, 0.9);
            text-shadow: 0 0 10px rgba(100, 255, 100, 0.5);
        }

        /* Owner credit - premium placement */
        .owner-badge {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            padding: 1rem 1.5rem;
            background: rgba(15, 15, 20, 0.6);
            border: 1px solid rgba(100, 50, 50, 0.3);
            border-radius: 6px;
            backdrop-filter: blur(15px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            opacity: 0;
            animation: fadeIn 1s ease forwards 2.2s;
            z-index: 25;
        }

        .owner-label {
            font-size: 0.65rem;
            color: rgba(255, 100, 100, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .owner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.1em;
        }

        /* Version info */
        .version-info {
            position: fixed;
            bottom: 2.5rem;
            left: 2.5rem;
            font-size: 0.7rem;
            color: rgba(120, 120, 120, 0.5);
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fadeIn 1s ease forwards 2.5s;
            z-index: 25;
        }

        /* Enhanced vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 250px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 10;
        }

        /* Film grain overlay */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="n"><feTurbulence baseFrequency="0.9" numOctaves="4" seed="0"/></filter><rect width="300" height="300" filter="url(%23n)" opacity="0.4"/></svg>');
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
            animation: grainMove 8s steps(10) infinite;
        }

        @keyframes grainMove {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            30% { transform: translate(3%, -8%); }
            50% { transform: translate(-8%, 2%); }
            70% { transform: translate(8%, 5%); }
            90% { transform: translate(-3%, -3%); }
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }

        /* Chromatic aberration effect on edges */
        .chromatic {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 
                inset 2px 0 3px rgba(255, 0, 0, 0.03),
                inset -2px 0 3px rgba(0, 255, 255, 0.03);
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>
    <div class="background-base"></div>
    
    <div class="stars" id="stars"></div>
    
    <div class="fog-layer fog-layer-1"></div>
    <div class="fog-layer fog-layer-2"></div>

    <div class="light-beams" id="lightBeams"></div>

    <div class="city-background">
        <div class="city-far" id="cityFar"></div>
        <div class="city-mid" id="cityMid"></div>
        <div class="city-near" id="cityNear"></div>
    </div>

    <div class="street-level">
        <div class="street-lights" id="streetLights"></div>
    </div>

    <div class="police-lights">
        <div class="siren-left"></div>
        <div class="siren-right"></div>
    </div>

    <div class="main-content">
        <div class="logo-section">
            <h1 class="server-logo">TURFLINE</h1>
            <p class="server-tagline">ROLEPLAY</p>
            <p class="server-description">Where The Streets Decide Your Fate</p>
        </div>

        <div class="loading-wrapper">
            <div class="progress-outer">
                <div class="progress-inner">
                    <div class="progress-shine"></div>
                </div>
                <div class="blood-drips">
                    <div class="blood-drop"></div>
                    <div class="blood-drop"></div>
                    <div class="blood-drop"></div>
                    <div class="blood-drop"></div>
                    <div class="blood-drop"></div>
                    <div class="blood-drop"></div>
                </div>
            </div>

            <div class="loading-details">
                <div class="status-left">
                    <div class="status-main" id="statusMain">Initializing Connection</div>
                    <div class="status-sub" id="statusSub">Establishing secure handshake...</div>
                </div>
                <div class="status-right">
                    <div class="percentage-large" id="percentage">0</div>
                    <div class="percentage-label">%</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panels">
        <div class="info-panel">
            <div class="panel-label">Server Status</div>
            <div class="panel-value online">ONLINE</div>
        </div>
        <div class="info-panel">
            <div class="panel-label">Ping</div>
            <div class="panel-value" id="ping">-- ms</div>
        </div>
    </div>

    <div class="owner-badge">
        <div class="owner-label">Server Owner</div>
        <div class="owner-name">FUNLARDON</div>
    </div>

    <div class="version-info">
        TURFLINE RP v2.4.1 | BUILD 2025.10
    </div>

    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="scanlines"></div>
    <div class="chromatic"></div>

    <script>
        // Create realistic starfield
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 60 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            const size = Math.random() * 1.5 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            starsContainer.appendChild(star);
        }

        // Create volumetric light beams
        const beamsContainer = document.getElementById('lightBeams');
        for (let i = 0; i < 5; i++) {
            const beam = document.createElement('div');
            beam.className = 'beam';
            beam.style.left = (i * 25 + 10) + '%';
            beam.style.top = (Math.random() * 20) + '%';
            beam.style.animationDelay = (i * 2) + 's';
            beam.style.animationDuration = (8 + Math.random() * 4) + 's';
            beamsContainer.appendChild(beam);
        }

        // Enhanced city generator with three layers
        function createCityLayer(container, buildings, blur) {
            buildings.forEach(b => {
                const building = document.createElement('div');
                building.className = 'building';
                building.style.width = b.w + 'px';
                building.style.height = b.h + 'px';
                building.style.left = b.x + '%';

                // Add antenna to some tall buildings
                if (b.h > 280 && Math.random() > 0.6) {
                    const antenna = document.createElement('div');
                    antenna.className = 'building-antenna';
                    building.appendChild(antenna);
                }

                // Add windows
                const windowsX = Math.floor(b.w / 12);
                const windowsY = Math.floor(b.h / 18);

                for (let y = 2; y < windowsY; y++) {
                    for (let x = 1; x < windowsX - 1; x++) {
                        if (Math.random() > 0.35) {
                            const win = document.createElement('div');
                            win.className = 'window';
                            win.style.width = '3px';
                            win.style.height = '5px';
                            win.style.left = (x * 12 + 3) + 'px';
                            win.style.top = (y * 18 + 5) + 'px';
                            win.style.opacity = Math.random() * 0.5 + 0.2;
                            win.style.animationDelay = (Math.random() * 5) + 's';
                            win.style.animationDuration = (Math.random() * 3 + 4) + 's';
                            building.appendChild(win);
                        }
                    }
                }
                container.appendChild(building);
            });
        }

        // Far city layer (background)
        const cityFar = [
            { w: 80, h: 180, x: 5 },
            { w: 60, h: 150, x: 15 },
            { w: 70, h: 170, x: 25 },
            { w: 65, h: 160, x: 35 },
            { w: 75, h: 190, x: 45 },
            { w: 55, h: 140, x: 55 },
            { w: 80, h: 180, x: 65 },
            { w: 70, h: 165, x: 75 },
            { w: 60, h: 155, x: 85 },
            { w: 75, h: 175, x: 93 }
        ];

        // Mid city layer
        const cityMid = [
            { w: 95, h: 260, x: 3 },
            { w: 75, h: 220, x: 12 },
            { w: 85, h: 245, x: 20 },
            { w: 70, h: 210, x: 28 },
            { w: 100, h: 290, x: 35 },
            { w: 80, h: 235, x: 44 },
            { w: 90, h: 255, x: 52 },
            { w: 75, h: 225, x: 61 },
            { w: 95, h: 270, x: 69 },
            { w: 85, h: 240, x: 78 },
            { w: 80, h: 230, x: 87 },
            { w: 90, h: 260, x: 95 }
        ];

        // Near city layer (foreground)
        const cityNear = [
            { w: 120, h: 340, x: 0 },
            { w: 90, h: 280, x: 10 },
            { w: 100, h: 310, x: 18 },
            { w: 85, h: 270, x: 26 },
            { w: 110, h: 360, x: 33 },
            { w: 95, h: 295, x: 42 },
            { w: 105, h: 330, x: 50 },
            { w: 90, h: 285, x: 59 },
            { w: 100, h: 315, x: 67 },
            { w: 115, h: 350, x: 75 },
            { w: 95, h: 290, x: 84 },
            { w: 105, h: 325, x: 92 }
        ];

        createCityLayer(document.getElementById('cityFar'), cityFar);
        createCityLayer(document.getElementById('cityMid'), cityMid);
        createCityLayer(document.getElementById('cityNear'), cityNear);

        // Create street lights
        const streetLightsContainer = document.getElementById('streetLights');
        const lightPositions = [8, 22, 38, 54, 68, 82, 95];
        lightPositions.forEach(pos => {
            const light = document.createElement('div');
            light.className = 'street-light';
            light.style.left = pos + '%';
            
            const glow = document.createElement('div');
            glow.className = 'light-glow';
            light.appendChild(glow);
            
            streetLightsContainer.appendChild(light);
        });

        // Advanced loading system
        const statusMessages = [
            {
                main: 'Initializing Connection',
                sub: 'Establishing secure handshake...'
            },
            {
                main: 'Authenticating Client',
                sub: 'Verifying credentials and permissions...'
            },
            {
                main: 'Loading Server Assets',
                sub: 'Retrieving configuration files...'
            },
            {
                main: 'Downloading Resources',
                sub: 'Fetching required content packages...'
            },
            {
                main: 'Syncing Game State',
                sub: 'Synchronizing world data...'
            },
            {
                main: 'Loading Map Data',
                sub: 'Building environment geometry...'
            },
            {
                main: 'Initializing Systems',
                sub: 'Starting gameplay modules...'
            },
            {
                main: 'Preparing Spawn',
                sub: 'Setting up player location...'
            },
            {
                main: 'Finalizing Connection',
                sub: 'Almost ready to play...'
            },
            {
                main: 'Connected Successfully',
                sub: 'Welcome to Turfline RP'
            }
        ];

        let progress = 0;
        let messageIndex = 0;
        let targetProgress = 0;

        const statusMain = document.getElementById('statusMain');
        const statusSub = document.getElementById('statusSub');
        const percentage = document.getElementById('percentage');
        const playerCount = document.getElementById('playerCount');
        const ping = document.getElementById('ping');

        // Simulate realistic loading with variable speeds
        function updateLoading() {
            if (progress < targetProgress) {
                progress += 0.5;
                percentage.textContent = Math.floor(progress);

                // Update message based on progress
                const msgIndex = Math.min(
                    Math.floor((progress / 100) * statusMessages.length),
                    statusMessages.length - 1
                );
                
                if (msgIndex !== messageIndex) {
                    messageIndex = msgIndex;
                    statusMain.style.opacity = '0';
                    statusSub.style.opacity = '0';
                    
                    setTimeout(() => {
                        statusMain.textContent = statusMessages[messageIndex].main;
                        statusSub.textContent = statusMessages[messageIndex].sub;
                        statusMain.style.transition = 'opacity 0.5s';
                        statusSub.style.transition = 'opacity 0.5s';
                        statusMain.style.opacity = '1';
                        statusSub.style.opacity = '1';
                    }, 200);
                }
            }

            if (progress < 100) {
                requestAnimationFrame(updateLoading);
            }
        }

        // Realistic loading pattern with pauses
        const loadingPattern = [
            { time: 0, target: 8 },
            { time: 500, target: 15 },
            { time: 800, target: 28 },
            { time: 1200, target: 35 },
            { time: 1800, target: 52 },
            { time: 2200, target: 64 },
            { time: 2800, target: 78 },
            { time: 3200, target: 85 },
            { time: 3800, target: 94 },
            { time: 4500, target: 100 }
        ];

        loadingPattern.forEach(step => {
            setTimeout(() => {
                targetProgress = step.target;
            }, step.time);
        });

        updateLoading();

        // Simulate ping
        setTimeout(() => {
            const pingValue = Math.floor(Math.random() * 40) + 15;
            ping.textContent = pingValue + ' ms';
        }, 1500);
    </script>
</body>
</html>
